<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 24px 0;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 36px 32px;
      width: 460px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
      font-size: 1.55rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .subtitle {
      text-align: center;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 28px;
    }

    /* ── Display ── */
    .display {
      background: rgba(0,0,0,0.35);
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 24px;
      min-height: 70px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .display .expression {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.4);
      min-height: 16px;
      margin-bottom: 4px;
    }

    .display .result {
      font-size: 2rem;
      font-weight: 700;
      color: #e2e8f0;
      text-align: right;
      word-break: break-all;
      transition: color 0.2s;
    }

    .display .result.error { color: #fc8181; font-size: 0.95rem; font-weight: 600; }

    /* ── Inputs ── */
    .inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 5px;
    }

    .input-group input {
      width: 100%;
      padding: 11px 12px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 600;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, background 0.2s, opacity 0.2s;
    }

    .input-group input:focus {
      border-color: #63b3ed;
      background: rgba(99,179,237,0.1);
    }

    .input-group input::placeholder { color: rgba(255,255,255,0.22); }

    .input-group input:disabled {
      opacity: 0.28;
      cursor: not-allowed;
    }

    .input-group .hint {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.3);
      margin-top: 4px;
      text-align: center;
      min-height: 12px;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: rgba(255,255,255,0.38);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 9px;
      margin-top: 18px;
    }

    /* ── Op buttons ── */
    .ops {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 9px;
      margin-bottom: 4px;
    }

    .ops-unary {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 9px;
      margin-bottom: 4px;
    }

    .op-btn {
      padding: 14px 6px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      transition: transform 0.1s, opacity 0.15s, box-shadow 0.15s;
    }

    .op-btn .lbl {
      display: block;
      font-size: 0.6rem;
      font-weight: 500;
      opacity: 0.78;
      margin-top: 3px;
      letter-spacing: 0.3px;
    }

    .op-btn:hover  { opacity: 0.88; transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.3); }
    .op-btn:active { transform: translateY(0); box-shadow: none; }
    .op-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    /* colours */
    .op-btn.add         { background: linear-gradient(135deg, #48bb78, #2f855a); }
    .op-btn.subtract    { background: linear-gradient(135deg, #f6ad55, #c05621); }
    .op-btn.multiply    { background: linear-gradient(135deg, #63b3ed, #2b6cb0); }
    .op-btn.divide      { background: linear-gradient(135deg, #fc8181, #c53030); }
    .op-btn.modulus     { background: linear-gradient(135deg, #b794f4, #6b46c1); }
    .op-btn.power       { background: linear-gradient(135deg, #f687b3, #b83280); }
    .op-btn.floor_div   { background: linear-gradient(135deg, #76e4f7, #0987a0); }
    .op-btn.percentage  { background: linear-gradient(135deg, #fbd38d, #b7791f); }
    .op-btn.sqrt        { background: linear-gradient(135deg, #68d391, #276749); }
    .op-btn.absolute    { background: linear-gradient(135deg, #90cdf4, #2a69ac); }

    /* unary badge */
    .op-btn .unary-badge {
      display: inline-block;
      font-size: 0.5rem;
      background: rgba(255,255,255,0.25);
      border-radius: 4px;
      padding: 1px 4px;
      margin-left: 4px;
      vertical-align: middle;
      letter-spacing: 0.3px;
    }

    /* ── Clear button ── */
    .clear-btn {
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: rgba(255,255,255,0.55);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .clear-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

    /* ── History ── */
    .history-wrap {
      margin-top: 22px;
      border-top: 1px solid rgba(255,255,255,0.07);
      padding-top: 18px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .history-header span {
      font-size: 0.7rem;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .history-header button {
      background: none;
      border: none;
      color: rgba(255,255,255,0.3);
      font-size: 0.72rem;
      cursor: pointer;
    }

    .history-header button:hover { color: #fc8181; }

    .history-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 150px;
      overflow-y: auto;
    }

    .history-list::-webkit-scrollbar { width: 3px; }
    .history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    .history-list li {
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 7px 11px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .history-list li .h-result { color: #e2e8f0; font-weight: 600; flex-shrink: 0; }

    /* spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>Calculator</h1>
  <p class="subtitle">Powered by REST API &nbsp;·&nbsp; 10 Operations</p>

  <!-- Display -->
  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="result" id="result">0</div>
  </div>

  <!-- Inputs -->
  <div class="inputs">
    <div class="input-group">
      <label>Number A</label>
      <input type="number" id="numA" placeholder="0" oninput="onInputChange()" />
      <div class="hint" id="hintA"></div>
    </div>
    <div class="input-group">
      <label>Number B</label>
      <input type="number" id="numB" placeholder="0" oninput="onInputChange()" />
      <div class="hint" id="hintB">not used for unary ops</div>
    </div>
  </div>

  <!-- Basic operations -->
  <div class="section-label">Basic</div>
  <div class="ops">
    <button class="op-btn add"      onclick="calculate('add',      false)">＋<span class="lbl">Add</span></button>
    <button class="op-btn subtract" onclick="calculate('subtract', false)">－<span class="lbl">Subtract</span></button>
    <button class="op-btn multiply" onclick="calculate('multiply', false)">×<span class="lbl">Multiply</span></button>
    <button class="op-btn divide"   onclick="calculate('divide',   false)">÷<span class="lbl">Divide</span></button>
  </div>

  <!-- Extended binary operations -->
  <div class="section-label">Extended</div>
  <div class="ops">
    <button class="op-btn modulus"    onclick="calculate('modulus',    false)">mod<span class="lbl">Modulus</span></button>
    <button class="op-btn power"      onclick="calculate('power',      false)">xⁿ<span class="lbl">Power</span></button>
    <button class="op-btn floor_div"  onclick="calculate('floor_divide', false)">⌊÷⌋<span class="lbl">Floor Div</span></button>
    <button class="op-btn percentage" onclick="calculate('percentage', false)">%<span class="lbl">A% of B</span></button>
  </div>

  <!-- Unary operations -->
  <div class="section-label">Unary <span style="font-weight:400;opacity:.6">(uses A only)</span></div>
  <div class="ops-unary">
    <button class="op-btn sqrt"     onclick="calculate('sqrt',     true)">√<span class="lbl">Square Root <span class="unary-badge">A only</span></span></button>
    <button class="op-btn absolute" onclick="calculate('absolute', true)">|x|<span class="lbl">Absolute Value <span class="unary-badge">A only</span></span></button>
  </div>

  <button class="clear-btn" onclick="clearAll()">Clear</button>

  <!-- History -->
  <div class="history-wrap">
    <div class="history-header">
      <span>History</span>
      <button onclick="clearHistory()">Clear history</button>
    </div>
    <ul class="history-list" id="history"></ul>
  </div>
</div>

<script>
  // Maps operation key → { symbol, endpoint }
  const OPS = {
    add:          { sym: '+',    url: '/add' },
    subtract:     { sym: '−',   url: '/subtract' },
    multiply:     { sym: '×',   url: '/multiply' },
    divide:       { sym: '÷',   url: '/divide' },
    modulus:      { sym: 'mod', url: '/modulus' },
    power:        { sym: '^',   url: '/power' },
    floor_divide: { sym: '//',  url: '/floor_divide' },
    percentage:   { sym: '% of',url: '/percentage' },
    sqrt:         { sym: '√',   url: '/sqrt' },
    absolute:     { sym: '|a|', url: '/absolute' },
  };

  let calcHistory = [];

  function onInputChange() {
    // nothing live – keeps UI snappy
  }

  async function calculate(operation, isUnary) {
    const aVal = document.getElementById('numA').value.trim();
    const bVal = document.getElementById('numB').value.trim();

    if (aVal === '') { showError('Please enter Number A.'); return; }
    if (!isUnary && bVal === '') { showError('Please enter Number B.'); return; }

    // Find button by class
    const btn = document.querySelector(`.op-btn.${operation.replace('_', '_')}`);
    const originalHTML = btn ? btn.innerHTML : '';
    if (btn) { btn.innerHTML = '<span class="spinner"></span>'; btn.disabled = true; }

    const body = isUnary
      ? { a: parseFloat(aVal) }
      : { a: parseFloat(aVal), b: parseFloat(bVal) };

    try {
      const res  = await fetch(OPS[operation].url, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(body),
      });
      const data = await res.json();

      if (!res.ok) { showError(data.error || 'Something went wrong.'); return; }

      const sym = OPS[operation].sym;
      let expr;
      if (isUnary) {
        expr = `${sym}(${fmt(data.a)})`;
      } else {
        expr = `${fmt(data.a)} ${sym} ${fmt(data.b)}`;
      }

      const resultVal = fmt(data.result);
      document.getElementById('expression').textContent = expr + ' =';
      const el = document.getElementById('result');
      el.textContent = resultVal;
      el.className = 'result';

      pushHistory(expr, resultVal);

    } catch {
      showError('Network error. Is the server running?');
    } finally {
      if (btn) { btn.innerHTML = originalHTML; btn.disabled = false; }
    }
  }

  function fmt(n) {
    if (n === undefined || n === null) return '—';
    if (Number.isInteger(n)) return n.toString();
    return parseFloat(n.toFixed(10)).toString();
  }

  function showError(msg) {
    document.getElementById('expression').textContent = '';
    const el = document.getElementById('result');
    el.textContent = msg;
    el.className = 'result error';
  }

  function clearAll() {
    document.getElementById('numA').value = '';
    document.getElementById('numB').value = '';
    document.getElementById('expression').textContent = '';
    document.getElementById('result').textContent = '0';
    document.getElementById('result').className = 'result';
  }

  function pushHistory(expr, result) {
    calcHistory.unshift({ expr, result });
    if (calcHistory.length > 25) calcHistory.pop();
    renderHistory();
  }

  function renderHistory() {
    document.getElementById('history').innerHTML = calcHistory
      .map(h => `<li><span>${h.expr}</span><span class="h-result">= ${h.result}</span></li>`)
      .join('');
  }

  function clearHistory() {
    calcHistory = [];
    renderHistory();
  }
</script>
</body>
</html>
